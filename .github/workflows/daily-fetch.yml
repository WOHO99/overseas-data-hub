name: Daily Global Fetch

on:
  schedule:
    # 北京时间每天8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 保持120min直到async重构后降为30min

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pyyaml

      - name: Run global fetch
        run: |
          cp -r scripts/* . 2>/dev/null || true
          python fetch_all.py 2>&1 | tee fetch_log.txt

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_number }}
          path: fetch_log.txt
          retention-days: 7

      - name: Upload JSON outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-outputs-${{ github.run_number }}
          path: |
            *.json
            !fail_counts.json
          retention-days: 7

      - name: Commit and push all JSON outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "daily global fetch $(date -u +%Y-%m-%d)" && git push)

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          for file in index.json global_business.json finance.json tech_industry.json energy_commodities.json geopolitics_risk.json esg_sustainability.json se_asia.json south_asia.json middle_east.json latam.json africa.json europe.json cis.json east_asia.json; do
            curl -s "https://purge.jsdelivr.net/gh/${REPO}@${BRANCH}/${file}" > /dev/null 2>&1 || true
          done
          echo "CDN cache purged for all JSON files (v3.5: 15 files)"
