name: Daily Global Fetch

on:
  schedule:
    # 北京时间每天8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # v4.9: Playwright high+medium(~16min)+full_text all(~5min)+RSS(~1min)+rest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser>=6.0 pyyaml>=6.0 aiohttp>=3.9 rapidfuzz>=3.0 trafilatura>=1.6 python-dateutil>=2.8 playwright>=1.40 jinja2>=3.1

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run global fetch
        run: |
          cd scripts
          python -u fetch_all.py 2>&1 | tee ../fetch_log.txt

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_number }}
          path: fetch_log.txt
          retention-days: 7

      - name: Upload JSON outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-outputs-${{ github.run_number }}
          path: scripts/*.json
          retention-days: 7

      - name: Stage JSON files to data/
        run: |
          mkdir -p data
          cp scripts/index.json data/ 2>/dev/null || true
          for f in scripts/global_business.json scripts/finance.json scripts/tech_industry.json scripts/energy_commodities.json scripts/geopolitics_risk.json scripts/esg_sustainability.json scripts/se_asia.json scripts/south_asia.json scripts/middle_east.json scripts/latam.json scripts/africa.json scripts/europe.json scripts/cis.json scripts/east_asia.json scripts/cross_border_ecommerce.json scripts/trade_import_export.json scripts/global_risk.json scripts/chinese_firms_overseas.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          # 信号与运维JSON
          for f in scripts/signal_summary.json scripts/source_fingerprint.json scripts/sources_dead.json scripts/signal_baseline.json scripts/last_state.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          echo "JSON 文件已汇总到 data/:"
          ls -lh data/

      - name: Generate unified HTML report
        if: success()
        run: |
          cd scripts
          python gen_unified_html.py ../data/ ../全球视野日报.html || echo "HTML generation failed, continuing..."

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: 全球视野日报.html
          retention-days: 30

      - name: Send daily report via email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: python send_report.py

      - name: Send daily brief (push notification)
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: python daily_brief.py
