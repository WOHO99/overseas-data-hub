name: Daily Global Fetch

on:
  schedule:
    # 北京时间每天8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # v4.2 Bucket+RapidFuzz，预期10-15min完成

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pyyaml aiohttp rapidfuzz

      - name: Run global fetch
        run: |
          cd scripts
          python fetch_all.py 2>&1 | tee ../fetch_log.txt

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_number }}
          path: fetch_log.txt
          retention-days: 7

      - name: Upload JSON outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-outputs-${{ github.run_number }}
          path: scripts/*.json
          retention-days: 7

      - name: Stage JSON files to data/
        run: |
          mkdir -p data
          cp scripts/index.json data/ 2>/dev/null || true
          for f in scripts/global_business.json scripts/finance.json scripts/tech_industry.json scripts/energy_commodities.json scripts/geopolitics_risk.json scripts/esg_sustainability.json scripts/se_asia.json scripts/south_asia.json scripts/middle_east.json scripts/latam.json scripts/africa.json scripts/europe.json scripts/cis.json scripts/east_asia.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          # 信号与运维JSON
          for f in scripts/signal_summary.json scripts/source_fingerprint.json scripts/sources_dead.json scripts/signal_baseline.json scripts/last_state.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          echo "JSON 文件已汇聚到 data/:"
          ls -lh data/

      - name: Send daily report via email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: python send_report.py

      - name: Send daily brief (push notification)
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: python daily_brief.py
