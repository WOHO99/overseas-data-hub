name: Daily Global Fetch

on:
  schedule:
    # 北京时间每天8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # v4.2 Bucket+RapidFuzz，预期10-15min完成

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pyyaml aiohttp rapidfuzz

      - name: Run global fetch
        run: |
          cd scripts
          python fetch_all.py 2>&1 | tee ../fetch_log.txt

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_number }}
          path: fetch_log.txt
          retention-days: 7

      - name: Upload JSON outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-outputs-${{ github.run_number }}
          path: scripts/*.json
          retention-days: 7

      - name: Commit and push all JSON outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 移动JSON文件到仓库根目录data/路径
          mkdir -p data
          cp scripts/index.json data/ 2>/dev/null || true
          for f in scripts/global_business.json scripts/finance.json scripts/tech_industry.json scripts/energy_commodities.json scripts/geopolitics_risk.json scripts/esg_sustainability.json scripts/se_asia.json scripts/south_asia.json scripts/middle_east.json scripts/latam.json scripts/africa.json scripts/europe.json scripts/cis.json scripts/east_asia.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          # P4新增JSON文件
          for f in scripts/signal_summary.json scripts/source_fingerprint.json scripts/sources_dead.json scripts/signal_baseline.json scripts/last_state.json; do
            [ -f "$f" ] && cp "$f" data/
          done
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "daily fetch $(date -u +%Y-%m-%d)" && git push)

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          for file in index.json global_business.json finance.json tech_industry.json energy_commodities.json geopolitics_risk.json esg_sustainability.json se_asia.json south_asia.json middle_east.json latam.json africa.json europe.json cis.json east_asia.json signal_summary.json source_fingerprint.json sources_dead.json signal_baseline.json last_state.json; do
            curl -s "https://purge.jsdelivr.net/gh/${REPO}@${BRANCH}/data/${file}" > /dev/null 2>&1 || true
          done
          echo "CDN cache purged for data/*.json"
