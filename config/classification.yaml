# classification.yaml v1.0 — 海外数据分类映射
# 共用方：generate_html_report.py / import_to_vault.py / intl-news-monitor技能
# 维护规则：变更后必须同步测试HTML日报+Agent检索，禁止单方修改

# ── 模块定义 ────────────────────────────────────────────────────
modules:
  order:
    - global_business
    - finance
    - tech_industry
    - energy_commodities
    - geopolitics_risk
    - esg_sustainability
    - se_asia
    - south_asia
    - middle_east
    - latam
    - africa
    - europe
    - cis
    - east_asia
  names:
    global_business: 全球商业
    finance: 金融
    tech_industry: 科技
    energy_commodities: 能源大宗
    geopolitics_risk: 地缘风险
    esg_sustainability: ESG与可持续
    se_asia: 东南亚
    south_asia: 南亚
    middle_east: 中东
    latam: 拉美
    africa: 非洲
    europe: 欧洲
    cis: 独联体
    east_asia: 日韩
  skip_files:
    - index.json
    - signal_summary.json
    - signal_baseline.json
    - last_state.json
    - source_fingerprint.json
    - sources_dead.json

