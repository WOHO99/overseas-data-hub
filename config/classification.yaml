# ── 主题分类 ─────────────────────────────────────────────────────
topic:
  # category字段 → 主题标签（直接映射，优先级最高）
  category_map:
    # 贸易与制裁
    "政策+制裁": 贸易与制裁
    "EU政策+制裁": 贸易与制裁
    # 宏观与央行
    "全球宏观": 宏观与央行
    "ECB+经济": 宏观与央行
    "汇率": 宏观与央行
    # 金融市场
    "全球财经": 金融市场
    "各国股市": 金融市场
    "资本流动": 金融市场
    "债市+信用": 金融市场
    # 大宗商品
    "大宗商品": 大宗商品
    "油气": 能源与油气
    "粮食安全": 农业与粮食
    # 产业链与制造
    "全球产业链重构": 产业链与制造
    "电动车+电池": 电动车与电池
    "半导体": 半导体
    "关键矿产": 关键矿产
    "矿业+中国": 关键矿产
    # 科技
    "科技+出海": 科技
    "基础设施+科技": 科技
    "AI": 科技
    "生物+航天": 科技
    # ESG与可持续
    "ESG法规": ESG与可持续
    "气候+人口": ESG与可持续
    "可持续供应链": ESG与可持续
    "能源转型+碳": ESG与可持续
    "碳+绿": ESG与可持续
    "气候风险": ESG与可持续
    # 地缘与安全
    "大国关系": 地缘与安全
