# source_tier_override.yaml — Domain-based source tier override
# 版本: v1.0 (2026-06-15)
# 用途: 当文章有 canonical_url 时，用 domain 查找 tier，优先于 source tag 查找
# 规则:
#   1. 精确 domain 匹配（如 reuters.com）
#   2. 后缀匹配（.reuters.com 匹配子域名）
#   3. 未匹配则回退到 source tag + authority_map 的原有逻辑
# tier 定义: A=顶级官方/通讯社 B=主流大报 C=一般媒体 D=低可信度 E=未解析GNews

overrides:
  # ===== A级: 顶级官方/通讯社 =====
  reuters.com: A
  .reuters.com: A
  apnews.com: A
  .apnews.com: A
  bloomberg.com: A           # sources_metadata=silver 但Bloomberg实际应A级
  .bloomberg.com: A
  wsj.com: A
  .wsj.com: A
  ft.com: A                  # FT实际应A级
  .ft.com: A
  ec.europa.eu: A
  federalreserve.gov: A
  .federalreserve.gov: A
  ecb.europa.eu: A
  whitehouse.gov: A
  gov.uk: A
  .gov.uk: A
  bis.org: A
  imf.org: A
  .imf.org: A
  worldbank.org: A
  .worldbank.org: A
  wto.org: A
  .wto.org: A
  commerce.gov: A
  treasury.gov: A
  .treasury.gov: A
  sec.gov: A
  .sec.gov: A
  federalregister.gov: A

  # ===== B级: 主流大报/权威媒体 =====
  bbc.co.uk: B
  .bbc.co.uk: B
  bbc.com: B
  .bbc.com: B
  nytimes.com: B
  .nytimes.com: B
  economist.com: B
  .economist.com: B
  washingtonpost.com: B
  .washingtonpost.com: B
  theguardian.com: B
  .theguardian.com: B
  cnbc.com: B
  .cnbc.com: B
  marketwatch.com: B
  politico.com: B
  .politico.com: B
  politico.eu: B
  foreignpolicy.com: B
  theatlantic.com: B
  theverge.com: B
  asia.nikkei.com: B
  nikkei.com: B
  .nikkei.com: B
  stratechery.com: B
  deepmind.google: B
  openai.com: B
  .openai.com: B
  technologyreview.com: B
  foreignaffairs.com: B
  dw.com: B
  .dw.com: B
  aljazeera.com: B
  .aljazeera.com: B
  scmp.com: B
  .scmp.com: B
  japantimes.co.jp: B
  .japantimes.co.jp: B
  spiegel.de: B
  handelsblatt.com: B
  lesEchos.fr: B
  lemonde.fr: B
  carbon-pulse.com: B
  esgdive.com: B
  cointelegraph.com: B
  venturebeat.com: B
  arstechnica.com: B
  wired.com: B

  # ===== GNews resolved 常见 domain (聚合器/转载) =====
  msn.com: D               # MSN聚合，原始源不可控
  .msn.com: D
  news.google.com: E        # GNews本身，不应出现为resolved
  apple.news: D             # Apple News聚合器

  # ===== D级: 低可信度/博客/聚合 =====
  medium.com: D
  .medium.com: D
  substack.com: D
  .substack.com: D
  reddit.com: D
  .reddit.com: D
  twitter.com: D
  x.com: D
  youtube.com: D
  .youtube.com: D
  linkedin.com: D
  .linkedin.com: D
  facebook.com: D
  tiktok.com: D
