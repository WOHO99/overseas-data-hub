# ============================================================
# domestic_sources.yaml v1.1 — 国内信源可信度评级库
# 整合老K 8条补充建议 + AKShare API优先策略
# ============================================================

# 全局配置
global:
  version: "1.1"
  updated: "2026-06-11"
  description: "国内信源A-E级评级库，API优先+抓取兜底"
  # 数值型数据容差带（建议3：数据值偏差容限）
  tolerance:
    consistent_pct: 3      # 差异3%以内视为一致
    conflict_pct: 10       # 差异超10%视为冲突
    range: "3%-10%"        # 中间地带：采信高权威，注明差异

# ============================================================
# A级：一手数据发布源（API优先，零解析）
# ============================================================
level_A:
  # --- 宏观经济（AKShare API） ---
  - name: "GDP季度数据"
    method: api
    library: akshare
    function: macro_china_gdp
    source: 国家统计局
    domain: stats.gov.cn
    # 建议1：着陆页备用机制
    primary_url: "https://data.stats.gov.cn/"
    fallback_url: "https://www.stats.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:stats.gov.cn + 关键词"
    update_freq: 季度
    data_fields: [季度, GDP绝对值, GDP同比增长, 一二三产业]

  - name: "CPI月度数据"
    method: api
    library: akshare
    function: macro_china_cpi
    source: 国家统计局
    domain: stats.gov.cn
    primary_url: "https://data.stats.gov.cn/"
    fallback_url: "https://www.stats.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:stats.gov.cn + CPI"
    update_freq: 月度
    data_fields: [月份, 全国当月, 同比增长, 环比增长, 累计]

  - name: "PPI月度数据"
    method: api
    library: akshare
    function: macro_china_ppi
    source: 国家统计局
    domain: stats.gov.cn
    primary_url: "https://data.stats.gov.cn/"
    fallback_url: "https://www.stats.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:stats.gov.cn + PPI"
    update_freq: 月度

  - name: "PMI月度数据"
    method: api
    library: akshare
    function: macro_china_pmi
    source: 国家统计局
    domain: stats.gov.cn
    primary_url: "https://data.stats.gov.cn/"
    fallback_url: "https://www.stats.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:stats.gov.cn + PMI"
    update_freq: 月度
    data_fields: [月份, 制造业指数, 非制造业指数]

  - name: "货币供应量M0/M1/M2"
    method: api
    library: akshare
    function: macro_china_money_supply
    source: 中国人民银行
    domain: pbc.gov.cn
    primary_url: "https://www.pbc.gov.cn/diaochatongjisi/116219/116319/index.html"
    fallback_url: "https://www.pbc.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:pbc.gov.cn + 货币供应"
    update_freq: 月度

  - name: "进出口贸易数据"
    method: api
    library: akshare
    function: macro_china_trade_balance
    source: 海关总署
    domain: customs.gov.cn
    primary_url: "http://stats.customs.gov.cn/"
    fallback_url: "https://www.customs.gov.cn/"
    fallback_rule: "若API失败→webfetch主URL→若404→site:customs.gov.cn + 进出口"
    update_freq: 月度
    note: "此API返回贸易帐差额，如需详细商品结构需webfetch海关统计平台"

  - name: "外汇储备"
    method: api
    library: akshare
    function: macro_china_fx_reserves_yearly
    source: 国家外汇管理局
    domain: safe.gov.cn
    primary_url: "https://www.safe.gov.cn/"
    fallback_url: "https://www.safe.gov.cn/"
    fallback_rule: "若API失败→site:safe.gov.cn + 外汇储备"
    update_freq: 月度
    note: "AKShare函数为年度数据，月度快讯需webfetch safe.gov.cn"

  - name: "LPR利率"
    method: api
    library: akshare
    function: macro_china_lpr
    source: 中国人民银行
    domain: pbc.gov.cn
    primary_url: "https://www.pbc.gov.cn/"
    fallback_url: "https://www.pbc.gov.cn/"
    fallback_rule: "若API失败→site:pbc.gov.cn + LPR"
    update_freq: 月度

  - name: "社会融资规模"
    method: api
    library: akshare
    function: macro_china_new_financial_credit
    source: 中国人民银行
    domain: pbc.gov.cn
    primary_url: "https://www.pbc.gov.cn/"
    fallback_url: "https://www.pbc.gov.cn/"
    fallback_rule: "若API失败→site:pbc.gov.cn + 社融"
    update_freq: 月度

  - name: "固定资产投资"
    method: api
    library: akshare
    function: macro_china_gdzctz
    source: 国家统计局
    domain: stats.gov.cn
    primary_url: "https://data.stats.gov.cn/"
    fallback_url: "https://www.stats.gov.cn/"
    fallback_rule: "若API失败→site:stats.gov.cn + 固定资产投资"
    update_freq: 月度

  # --- A级额外API（非宏观，但一手数据） ---
  - name: "上市公司公告"
    method: api
    library: akshare
    function: stock_notice_report
    source: 巨潮信息网(cninfo.com.cn)
    domain: cninfo.com.cn
    primary_url: "http://www.cninfo.com.cn/"
    fallback_url: "http://www.cninfo.com.cn/new/commonUrl?url=disclosure"
    fallback_rule: "若API失败→site:cninfo.com.cn + 公司名"
    update_freq: 实时
    note: "AKShare封装的巨潮接口，可按股票代码/类型筛选"

  - name: "东方财富行情数据"
    method: api
    library: akshare
    function: stock_zh_a_hist
    source: 东方财富
    domain: eastmoney.com
    primary_url: "https://push2his.eastmoney.com/"
    fallback_url: "https://quote.eastmoney.com/"
    fallback_rule: "若API失败→site:eastmoney.com + 股票代码"
    update_freq: 日度
    note: "提供A股历史K线，需指定symbol和period参数"

  # --- A级政策类（webfetch直连，无API） ---
  - name: "国务院政策文件"
    method: webfetch
    source: 国务院
    domain: gov.cn
    primary_url: "https://www.gov.cn/zhengce/"
    fallback_url: "https://www.gov.cn/"
    fallback_rule: "若主URL不可达→site:gov.cn + 政策关键词"
    update_freq: 实时
    data_types: [政策文件, 法规, 公告, 讲话]

  - name: "商务部政策/数据"
    method: webfetch
    source: 商务部
    domain: mofcom.gov.cn
    primary_url: "http://opendata.mofcom.gov.cn/"
    fallback_url: "http://www.mofcom.gov.cn/"
    fallback_rule: "若主URL不可达→site:mofcom.gov.cn + 关键词"
    update_freq: 不定期

  - name: "证监会监管动态"
    method: webfetch
    source: 证监会
    domain: csrc.gov.cn
    primary_url: "https://www.csrc.gov.cn/"
    fallback_url: "https://www.csrc.gov.cn/csrc/"
    fallback_rule: "若主URL不可达→site:csrc.gov.cn + 关键词"
    update_freq: 实时

