# ============================================================
level_E:
  rule: "不主动抓取。仅当A-D级引用时作参考。NEVER作为分析依据。"
  typical_sources: [百家号, 头条号, 知乎营销号, 微信公众号转载, SEO聚合站]
  blacklist: []  # 故意造假的信源移入此列表，永久屏蔽

# ============================================================
# API直连通道（v1.2新增，2026-06-11全量验证通过）
# ============================================================
# 三层架构：L1快速(AKShare) → L2深度(统计局V2.0) → L3国际(世界银行)
# 路由规则：L1能查→L1，L1无→L2，国内外对比→L3

api_channels:
  # --- L1 快速通道：AKShare（17个已验证函数） ---
  L1_akshare:
    description: "一行代码拿数据，无限额，A级快速通道"
    method: "python -c \"import akshare as ak; print(ak.{function}())\""
    label: "[A-api]"
    verified_functions:
      # 宏观经济
      - {function: macro_china_gdp, data: GDP季度, source: 国家统计局, freq: 季度}
      - {function: macro_china_cpi, data: CPI月度, source: 国家统计局, freq: 月度}
      - {function: macro_china_ppi, data: PPI月度, source: 国家统计局, freq: 月度}
      - {function: macro_china_pmi, data: PMI月度, source: 国家统计局, freq: 月度}
      - {function: macro_china_money_supply, data: M0/M1/M2, source: 央行, freq: 月度}
      - {function: macro_china_trade_balance, data: 贸易差额, source: 海关总署, freq: 月度}
      - {function: macro_china_fx_reserves_yearly, data: 外汇储备(年度), source: 外管局, freq: 年度}
      - {function: macro_china_lpr, data: LPR利率, source: 央行, freq: 月度}
      - {function: macro_china_new_financial_credit, data: 新增社融, source: 央行, freq: 月度}
      - {function: macro_china_gdzctz, data: 固定资产投资, source: 国家统计局, freq: 月度}
      - {function: macro_china_urban_unemployment, data: 城镇失业率, source: 国家统计局, freq: 月度}
      - {function: macro_china_exports_yoy, data: 出口同比, source: 海关, freq: 月度}
      - {function: macro_china_imports_yoy, data: 进口同比, source: 海关, freq: 月度}
      - {function: macro_china_industrial_production_yoy, data: 工业增加值同比, source: 国家统计局, freq: 月度}
      - {function: macro_china_consumer_goods_retail, data: 社消零售, source: 国家统计局, freq: 月度}
      # 金融市场
      - {function: stock_notice_report, data: 上市公司公告, source: 巨潮, freq: 实时}
      - {function: stock_zh_a_hist, data: A股历史行情, source: 东方财富, freq: 日度}
    fallback: "AKShare函数报错→自动降级到L2统计局V2.0"

  # --- L2 深度通道：国家统计局V2.0 API ---
  L2_nbs_v2:
    description: "全量统计指标，三步走（搜索→指标→取值），1000次/日"
    base_url: "https://data.stats.gov.cn/dg/website/publicrelease/web/external"
    auth: 无需鉴权
    daily_limit: 1000
    label: "[A-v2]"
    root_ids:
      monthly: "fc982599aa684be7969d7b90b1bd0e84"
      quarterly: "待确认"
      yearly: "待确认"
    endpoints:
      search:
        method: GET
        path: "/query"
        params: "search={keyword}&pagenum=1&pageSize=10"
        note: "搜索定位cid和indicatorId，返回最新值"
      tree:
        method: GET
        path: "/new/queryIndexTreeAsync"
        params: "pid={parent_id}&code={1|2|3|5|6|7}"
        codes: {1: 月度, 2: 季度, 3: 年度, 5: 分省季度, 6: 分省年度, 7: 其他}
        note: "遍历目录树，找isLeaf:true的节点，_id即为cid"
      indicators:
        method: GET
        path: "/new/queryIndicatorsByCid"
        params: "cid={catalog_id}"
        note: "获取indicatorId列表，含i_showname/i_mark统计口径/du单位"
      data:
        method: POST
        path: "/getEsDataByCidAndDt"
        content_type: "application/json"
        body_template:
          cid: "{catalog_id}"
          indicatorIds: ["{indicator_id_1}", "{indicator_id_2}"]
          das: [{"text": "全国", "value": "000000000000"}]
          dts: ["{start_time}-{end_time}"]
          showType: "1"
          rootId: "{root_id}"
        time_encoding:
          monthly: "YYYYMM后缀MM（如202602MM）"
          quarterly: "YYYYQ后缀SS（如20254→202504SS）"
          yearly: "YYYY后缀YY（如2025YY）"
          range: "Start-End（如202501MM-202602MM）"
    key_constraints:
      - "同一指标因时间分片对应多个cid（通常5年一段），需分别请求后本地拼接"
      - "跨cid时indicatorId可能不同，每个cid都需重新调用indicators端点"
      - "i_mark字段含统计口径说明，展示数据时必须附带"
    verified_searches: [GDP, CPI, PMI, 居民消费价格, 出口]
    region_codes:
      national: "000000000000"

  # --- L3 国际通道：世界银行开放数据 ---
  L3_worldbank:
    description: "200+国家宏观指标对比，无需Key，完全免费"
    base_url: "https://api.worldbank.org/v2"
    auth: 无需Key
    daily_limit: 无
    label: "[A-wb]"
    response_format: "json（添加?format=json参数）"
    country_codes:
      CN: 中国
      US: 美国
      JP: 日本
      DE: 德国
      KR: 韩国
      IN: 印度
      BR: 巴西
      RU: 俄罗斯
      multi_format: "多国用分号分隔（CN;US;JP）"
    key_indicators:
      GDP_current_usd: "NY.GDP.MKTP.CD"
      GDP_growth: "NY.GDP.MKTP.KD.ZG"
      CPI_inflation: "FP.CPI.TOTL.ZG"
      trade_pct_gdp: "NE.TRD.GNFS.ZS"
      exports_usd: "NE.EXP.GNFS.CD"
      imports_usd: "NE.IMP.GNFS.CD"
      exchange_rate: "PA.NUS.FCRF"
      unemployment: "SL.UEM.TOTL.ZS"
      gov_debt_pct_gdp: "GC.DOD.TOTL.GD.ZS"
      FDI_pct_gdp: "BX.KLT.DINV.WD.GD.ZS"
    query_template: "/country/{country}/indicator/{indicator_id}?format=json&date={start}:{end}&per_page=50"
    verified: true

  # --- L3 国际通道：待Key激活 ---
  L3_pending:
    FRED:
      description: "80万+美国宏观时序指标"
      base_url: "https://api.stlouisfed.org/fred"
      auth: 需免费API Key
      label: "[B-fred]"
      status: "待申请Key"
      apply_url: "https://fred.stlouisfed.org/docs/api/api_key.html"
      priority: "中"
    UN_Comtrade:
      description: "HS编码级全球双边贸易数据"
      base_url: "https://comtradeapi.un.org/public/v1"
      auth: 需免费注册
      label: "[A-un]"
      status: "待注册+确认正确端点"
      apply_url: "https://comtradedeveloper.un.org/"
      python_package: "comtradeapicall"
      priority: "高"

# ============================================================
# 信源健康自优化规则（建议7：升级条件更严格）
# ============================================================
health_rules:
  downgrade:
    trigger: "连续3次数据错误或严重延迟"
    action: "降一级"
  upgrade:
    trigger: "连续10次提供独家准确数据"
    extra_condition: "必须被A/B级信源事后确认（建议7）"
    action: "升一级"
  blacklist:
    trigger: "发现故意造假/编造数据"
    action: "永久屏蔽"

